<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Три команды · Чистая версия</title>
    <style>
        /* БАЗОВЫЕ СБРОСЫ И СТИЛИ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #1e2b3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* МОДАЛЬНОЕ ОКНО ВВОДА */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: #243341;
            border-radius: 70px;
            padding: 40px 50px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 30px 40px rgba(0,0,0,0.8), inset 0 1px 3px rgba(255,215,0,0.3);
            border: 2px solid #f3b34c;
            text-align: center;
        }

        .modal-card h2 {
            color: #f8e3a7;
            font-size: 2.4rem;
            margin-bottom: 35px;
            text-shadow: 0 2px 5px #ff9900;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #ffd58c;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: #1d2b37;
            border: 2px solid #c79a4b;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 1.6rem;
            color: #ffde9e;
            font-weight: 600;
            outline: none;
        }

        .input-group input:focus {
            border-color: #f5b835;
            box-shadow: 0 0 15px #f5b835;
        }

        .start-btn {
            background: linear-gradient(145deg, #3f9e4b, #2d7536);
            border: none;
            font-size: 2.4rem;
            font-weight: 700;
            padding: 18px 40px;
            border-radius: 60px;
            color: #faf0c0;
            text-shadow: 0 2px 0 #1b4f1f;
            box-shadow: 0 12px 0 #1b4f1f, 0 10px 30px black;
            cursor: pointer;
            transition: 0.08s linear;
            margin-top: 20px;
        }

        .start-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #1b4f1f, 0 10px 20px black;
        }

        /* ОСНОВНОЕ ТАБЛО (изначально скрыто) */
        .scoreboard {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 30px 25px;
            box-shadow: 0 30px 45px -20px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,215,0,0.2);
            display: none;
        }

        h1 {
            text-align: center;
            color: #f8e3a7;
            font-size: 2.8rem;
            text-shadow: 0 2px 10px #ffb347;
            margin-bottom: 20px;
        }

        /* СЕТКА КАРТОЧЕК — ТРИ КОЛОНКИ */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 30px 0 25px;
        }

        .team-card {
            background: #283845;
            border-radius: 40px;
            padding: 25px 12px 20px;
            box-shadow: 0 12px 0 #121d2b;
            border-left: 2px solid #f3b34c;
            border-right: 2px solid #c57c1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffde9e;
            text-shadow: 0 2px 0 #7f4f1a;
            text-align: center;
            word-break: break-word;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 800;
            background: #1d2b37;
            color: #ffd966;
            padding: 6px 30px;
            border-radius: 80px;
            margin: 10px auto 15px;
            box-shadow: inset 0 -3px 0 #0f1a22, 0 5px 0 #0b1219;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .add-btn {
            background: #3f525f;
            border: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
            width: 70px;
            height: 60px;
            border-radius: 40px;
            box-shadow: 0 6px 0 #1e2b32;
            cursor: pointer;
            transition: 0.08s;
        }

        .add-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1e2b32;
        }

        /* Цвета кнопок */
        .add-btn[data-points="10"] { background: #3b6e8f; }
        .add-btn[data-points="20"] { background: #3c8d7e; }
        .add-btn[data-points="30"] { background: #6d8f4b; }
        .add-btn[data-points="40"] { background: #b87c2b; }
        .add-btn[data-points="50"] { background: #b3513a; }

        .control-panel {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .end-btn {
            background: linear-gradient(145deg, #ca4141, #a12828);
            border: none;
            font-size: 2.8rem;
            font-weight: 800;
            padding: 15px 60px;
            border-radius: 60px;
            color: #ffecaa;
            text-shadow: 0 2px 0 #4e1a1a;
            box-shadow: 0 15px 0 #631f1f;
            cursor: pointer;
            transition: 0.05s;
        }

        .end-btn:active {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #631f1f;
        }

        .winner-zone {
            background: #1d2a33d9;
            border-radius: 70px;
            padding: 25px 35px;
            margin-top: 25px;
            text-align: center;
            border: 3px solid #f5c542;
            font-size: 2.2rem;
            color: #ffd966;
            backdrop-filter: blur(6px);
        }

        .other-participants {
            margin-top: 20px;
            background: #1e2e3ab3;
            border-radius: 50px;
            padding: 20px;
            color: #cfdce6;
        }

        .other-row {
            display: flex;
            justify-content: center;
            gap: 30px 50px;
            flex-wrap: wrap;
        }

        .other-badge {
            background: #263b49;
            padding: 10px 35px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 600;
            box-shadow: inset 0 -2px 0 #0b161f;
        }

        .other-badge strong {
            color: #f8c15e;
            margin-right: 10px;
        }

        .hidden {
            display: none !important;
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <!-- Модальное окно ввода названий команд -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-card">
            <h2>⚡ Введите названия команд ⚡</h2>
            <div class="input-group">
                <label>Команда 1</label>
                <input type="text" id="team1Input" placeholder="например: Альфа" value="Альфа">
            </div>
            <div class="input-group">
                <label>Команда 2</label>
                <input type="text" id="team2Input" placeholder="например: Бета" value="Бета">
            </div>
            <div class="input-group">
                <label>Команда 3</label>
                <input type="text" id="team3Input" placeholder="например: Гамма" value="Гамма">
            </div>
            <button class="start-btn" id="startGameBtn">СТАРТ</button>
        </div>
    </div>

    <!-- Основное табло -->
    <div class="scoreboard" id="scoreboard">
        <h1 id="dynamicTitle">⚡ КОМАНДЫ ⚡</h1>

        <div class="grid" id="playerGrid"></div>

        <div class="control-panel">
            <button class="end-btn" id="endGameBtn">КОНЕЦ</button>
        </div>

        <div id="winnerBlock" class="winner-zone hidden"></div>
        <div id="othersBlock" class="other-participants hidden"></div>
    </div>

    <script>
        (function() {
            // DOM-элементы
            const modal = document.getElementById('modalOverlay');
            const scoreboard = document.getElementById('scoreboard');
            const team1Input = document.getElementById('team1Input');
            const team2Input = document.getElementById('team2Input');
            const team3Input = document.getElementById('team3Input');
            const startBtn = document.getElementById('startGameBtn');
            const dynamicTitle = document.getElementById('dynamicTitle');

            // Переменные игры
            let teamNames = ['Команда 1', 'Команда 2', 'Команда 3'];
            let scores = [0, 0, 0];
            let gameActive = true;
            let winnerTimeout = null;
            let confettiActive = false;
            let animationFrame = null;

            // Конфетти canvas
            const confettiCanvas = document.getElementById('confetti-canvas');
            let ctx = confettiCanvas.getContext('2d');
            let width, height;
            let particles = [];

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                confettiCanvas.width = width;
                confettiCanvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Частицы конфетти
            function createParticle() {
                const colors = ['#f2d74b', '#f25f5c', '#80cbc4', '#ffb3ba', '#b39ddb', '#ffcc80', '#f8bbd0', '#a5d6a7'];
                return {
                    x: Math.random() * width,
                    y: Math.random() * height - height,
                    size: Math.random() * 7 + 4,
                    speedY: Math.random() * 5 + 3,
                    speedX: Math.random() * 2 - 1,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                };
            }

            function initConfetti() {
                particles = [];
                for (let i = 0; i < 130; i++) particles.push(createParticle());
            }

            function updateConfetti() {
                if (!confettiActive) return;
                ctx.clearRect(0, 0, width, height);
                let anyVisible = false;
                for (let p of particles) {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += 0.5;
                    if (p.y < height + 30) anyVisible = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                }
                if (!anyVisible) {
                    particles = particles.map(p => (p.y > height + 40) ? { ...p, y: -20, x: Math.random() * width } : p);
                }
                animationFrame = requestAnimationFrame(updateConfetti);
            }

            function startConfetti() {
                if (confettiActive) return;
                confettiActive = true;
                initConfetti();
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animationFrame = requestAnimationFrame(updateConfetti);
            }

            function stopConfetti() {
                confettiActive = false;
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
                ctx.clearRect(0, 0, width, height);
            }

            // Отрисовка карточек команд
            function renderPlayers() {
                const grid = document.getElementById('playerGrid');
                let html = '';
                for (let i = 0; i < teamNames.length; i++) {
                    html += `
                        <div class="team-card" data-index="${i}">
                            <div class="team-name">${teamNames[i]}</div>
                            <div class="score-display" id="score-${i}">${scores[i]}</div>
                            <div class="button-group">
                                <button class="add-btn" data-points="10" data-index="${i}" ${!gameActive ? 'disabled' : ''}>10</button>
                                <button class="add-btn" data-points="20" data-index="${i}" ${!gameActive ? 'disabled' : ''}>20</button>
                                <button class="add-btn" data-points="30" data-index="${i}" ${!gameActive ? 'disabled' : ''}>30</button>
                                <button class="add-btn" data-points="40" data-index="${i}" ${!gameActive ? 'disabled' : ''}>40</button>
                                <button class="add-btn" data-points="50" data-index="${i}" ${!gameActive ? 'disabled' : ''}>50</button>
                            </div>
                        </div>
                    `;
                }
                grid.innerHTML = html;
            }

            function refreshScores() {
                for (let i = 0; i < teamNames.length; i++) {
                    const el = document.getElementById(`score-${i}`);
                    if (el) el.innerText = scores[i];
                }
            }

            // Обработчик добавления очков
            function handleAddScore(e) {
                if (!gameActive) return;
                const btn = e.target.closest('.add-btn');
                if (!btn) return;
                const index = btn.dataset.index;
                const points = parseInt(btn.dataset.points, 10);
                if (index !== undefined && !isNaN(points)) {
                    scores[index] += points;
                    refreshScores();
                }
            }

            // Победитель
            function getWinnerInfo() {
                let maxScore = -1, winnerIndex = 0;
                for (let i = 0; i < scores.length; i++) {
                    if (scores[i] > maxScore) {
                        maxScore = scores[i];
                        winnerIndex = i;
                    }
                }
                return { winnerIndex, maxScore };
            }

            // Показать остальных через 6 секунд
            function showOthersAfterDelay() {
                if (winnerTimeout) clearTimeout(winnerTimeout);
                winnerTimeout = setTimeout(() => {
                    stopConfetti();

                    const { winnerIndex } = getWinnerInfo();
                    const others = teamNames.map((name, idx) => ({ name, score: scores[idx] }))
                                             .filter((_, idx) => idx !== winnerIndex);

                    let othersHtml = '<div class="other-row">';
                    others.forEach(p => {
                        othersHtml += `<div class="other-badge"><strong>${p.name}</strong> ${p.score} очк.</div>`;
                    });
                    othersHtml += '</div>';
                    document.getElementById('othersBlock').innerHTML = othersHtml;
                    document.getElementById('othersBlock').classList.remove('hidden');

                    winnerTimeout = null;
                }, 6000);
            }

            // Завершение игры
            function finishGame() {
                if (!gameActive) return;

                gameActive = false;
                renderPlayers();  // перерисовка с disabled-кнопками

                const { winnerIndex, maxScore } = getWinnerInfo();
                const winnerName = teamNames[winnerIndex];

                const winnerBlock = document.getElementById('winnerBlock');
                winnerBlock.innerHTML = `🏆 <strong style="font-size:3rem;">${winnerName}</strong>  —  ${maxScore} очков 🏆`;
                winnerBlock.classList.remove('hidden');

                document.getElementById('othersBlock').classList.add('hidden');
                if (winnerTimeout) clearTimeout(winnerTimeout);

                startConfetti();
                showOthersAfterDelay();
            }

            // Старт игры (после ввода названий)
            function startGame() {
                let t1 = team1Input.value.trim() || 'Команда 1';
                let t2 = team2Input.value.trim() || 'Команда 2';
                let t3 = team3Input.value.trim() || 'Команда 3';

                teamNames = [t1, t2, t3];
                scores = [0, 0, 0];
                gameActive = true;
                stopConfetti();

                modal.style.display = 'none';
                scoreboard.style.display = 'block';

                dynamicTitle.innerText = `${t1}  ·  ${t2}  ·  ${t3}`;

                renderPlayers();

                // Скрыть старые результаты
                document.getElementById('winnerBlock').classList.add('hidden');
                document.getElementById('othersBlock').classList.add('hidden');
                if (winnerTimeout) {
                    clearTimeout(winnerTimeout);
                    winnerTimeout = null;
                }
            }

            // События
            startBtn.addEventListener('click', startGame);
            [team1Input, team2Input, team3Input].forEach(input => {
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') startGame(); });
            });

            document.getElementById('playerGrid').addEventListener('click', handleAddScore);
            document.getElementById('endGameBtn').addEventListener('click', finishGame);
        })();
    </script>
</body>
</html>
